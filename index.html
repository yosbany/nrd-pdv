<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="NRD Punto de Venta">
  <title>NRD PDV</title>
  <link rel="manifest" href="manifest.json">
  <script>
    (function() {
      if (console.warn) {
        const originalWarn = console.warn;
        console.warn = function(...args) {
          if (args[0] && typeof args[0] === 'string' &&
              (args[0].includes('cdn.tailwindcss.com should not be used in production') ||
               args[0].includes('cdn.tailwindcss.com'))) {
            return;
          }
          originalWarn.apply(console, args);
        };
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.logger = window.logger || console;
  </script>
  <link rel="stylesheet" href="assets/styles/styles.css?v=1781967493163">
  <meta name="theme-color" content="#dc2626">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <script>
    (function() {
      var RELOAD_KEY = 'nrd-version-reload-ts';
      var RELOAD_COOLDOWN_MS = 15000;
      var lastReload = parseInt(sessionStorage.getItem(RELOAD_KEY) || '0', 10);
      if (Date.now() - lastReload < RELOAD_COOLDOWN_MS) return;
      var link = document.querySelector('link[rel="stylesheet"][href*="assets/styles/styles.css"]') ||
                 document.querySelector('link[rel="stylesheet"][href*=".css"]');
      var match = link && link.href && link.href.match(/[?&]v=(\d+)/);
      var localVersion = match ? String(match[1]) : null;
      if (!localVersion) return;
      fetch('version.json?t=' + Date.now(), { cache: 'no-store' })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          var serverVersion = data && data.v != null ? String(data.v) : null;
          if (!serverVersion || serverVersion === localVersion) return;
          sessionStorage.setItem(RELOAD_KEY, String(Date.now()));
          var sw = ('serviceWorker' in navigator)
            ? navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(r) { r.unregister(); });
              })
            : Promise.resolve();
          var cacheClear = ('caches' in window)
            ? caches.keys().then(function(names) { names.forEach(function(n) { caches.delete(n); }); })
            : Promise.resolve();
          Promise.all([sw, cacheClear]).finally(function() { window.location.reload(); });
        })
        .catch(function() {});
    })();
  </script>
</head>
<body class="bg-white text-black font-sans antialiased h-screen overflow-hidden">
  <div id="loading-spinner" class="fixed inset-0 bg-black/20 z-[60] hidden flex items-center justify-center">
    <div class="bg-white p-6 flex flex-col items-center gap-4 shadow-lg">
      <div class="w-12 h-12 border-4 border-gray-200 border-t-red-600 rounded-full animate-spin"></div>
      <p class="text-sm text-gray-600 font-light">Cargando...</p>
    </div>
  </div>

  <div id="redirecting-screen" class="min-h-screen flex items-center justify-center bg-white">
    <div class="flex flex-col items-center gap-4">
      <div class="w-12 h-12 border-4 border-gray-200 border-t-red-600 rounded-full animate-spin"></div>
      <p class="text-sm text-gray-600 font-light" data-auth-status>Redirigiendo...</p>
    </div>
  </div>

  <div id="login-screen" class="min-h-screen flex items-center justify-center p-4 sm:p-6 hidden">
    <div class="w-full max-w-sm">
      <h1 class="text-xl sm:text-2xl font-light text-center mb-6 sm:mb-8 tracking-tight">NRD Punto de Venta</h1>
      <form id="login-form" class="space-y-3 sm:space-y-4">
        <input type="email" id="login-email" placeholder="Email" autocomplete="username" required
          class="w-full px-0 py-2.5 sm:py-3 border-0 border-b border-gray-300 focus:outline-none focus:border-red-600 bg-transparent text-sm sm:text-base">
        <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password" required
          class="w-full px-0 py-2.5 sm:py-3 border-0 border-b border-gray-300 focus:outline-none focus:border-red-600 bg-transparent text-sm sm:text-base">
        <button type="submit"
          class="w-full mt-4 sm:mt-6 py-2.5 sm:py-3 bg-red-600 text-white border border-red-600 hover:bg-red-700 transition-colors uppercase tracking-wider text-xs sm:text-sm font-light">
          Iniciar Sesión
        </button>
      </form>
      <div id="login-error" class="mt-3 sm:mt-4 text-center text-xs sm:text-sm text-red-600"></div>
    </div>
  </div>

  <div id="app-screen" class="h-screen flex flex-col overflow-hidden hidden">
    <div id="app-header-container" data-app-name="NRD PDV" data-icon-path="assets/icons/icon-192.png"></div>
    <nav id="app-nav-container" class="hidden"></nav>
    <main class="flex-1 min-h-0 p-0 overflow-hidden w-full flex flex-col">
      <div id="dashboard-view" class="view flex-1 min-h-0">
        <div id="pdv-tiles-grid" class="grid grid-cols-2 md:grid-cols-3 gap-0 h-full min-h-0"></div>
      </div>
      <div id="punto-venta-view" class="view hidden flex-1 min-h-0 flex flex-col"></div>
      <div id="pago-view" class="view hidden flex-1 min-h-0 flex flex-col"></div>
    </main>
  </div>

  <!-- Profile Modal -->
  <div id="profile-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white max-w-md w-full border border-gray-200 shadow-lg">
      <div class="p-4 sm:p-6 border-b border-gray-200 flex items-center justify-between">
        <h3 class="text-lg sm:text-xl font-light tracking-tight">Perfil de Usuario</h3>
        <button id="close-profile-modal" class="text-gray-400 hover:text-red-600 text-xl font-light">×</button>
      </div>
      <div id="profile-modal-content" class="p-4 sm:p-6 space-y-4"></div>
      <div class="p-4 sm:p-6 border-t border-gray-200 space-y-2">
        <a id="portal-link" href="/nrd-portal/"
          class="block w-full px-4 sm:px-6 py-2 bg-blue-600 text-white border border-blue-600 hover:bg-blue-700 transition-colors uppercase tracking-wider text-xs sm:text-sm font-light text-center">
          Ir al Portal
        </a>
        <button id="profile-logout-btn"
          class="w-full px-4 sm:px-6 py-2 bg-red-600 text-white border border-red-600 hover:bg-red-700 transition-colors uppercase tracking-wider text-xs sm:text-sm font-light">
          Cerrar Sesión
        </button>
      </div>
    </div>
  </div>

  <!-- Modal Pago Efectivo -->
  <div id="modal-pago-efectivo" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4">
    <div class="bg-gray-100 w-full max-w-md border border-gray-200 shadow-lg">
      <div class="p-4 sm:p-6 border-b border-gray-200">
        <p class="text-gray-700 font-medium">Total a cobrar</p>
        <p id="modal-pago-total" class="text-xl font-medium">$ 0,00</p>
        <p class="text-sm text-gray-500 mt-1">Caja mostrador $</p>
        <p id="modal-pago-caja" class="text-sm font-medium">$ 0,00</p>
      </div>
      <div class="p-4 sm:p-6 border-b border-gray-200">
        <p class="text-gray-700 font-medium mb-2">Paga con</p>
        <input type="text" id="modal-pago-input" readonly
          class="w-full px-4 py-3 text-xl font-medium border-2 border-green-600 bg-white text-gray-800"
          value="$ 0,00">
        <div class="grid grid-cols-6 gap-1 mt-3">
          <button type="button" class="pdv-quick-amount py-2 text-blue-600 font-medium border border-gray-300 bg-white hover:bg-gray-50" data-amount="50">50</button>
          <button type="button" class="pdv-quick-amount py-2 text-blue-600 font-medium border border-gray-300 bg-white hover:bg-gray-50" data-amount="100">100</button>
          <button type="button" class="pdv-quick-amount py-2 text-blue-600 font-medium border border-gray-300 bg-white hover:bg-gray-50" data-amount="200">200</button>
          <button type="button" class="pdv-quick-amount py-2 text-blue-600 font-medium border border-gray-300 bg-white hover:bg-gray-50" data-amount="500">500</button>
          <button type="button" class="pdv-quick-amount py-2 text-blue-600 font-medium border border-gray-300 bg-white hover:bg-gray-50" data-amount="1000">1000</button>
          <button type="button" class="pdv-quick-amount py-2 text-blue-600 font-medium border border-gray-300 bg-white hover:bg-gray-50" data-amount="2000">2000</button>
        </div>
      </div>
      <div class="p-4 flex gap-3 bg-gray-300">
        <button type="button" id="modal-pago-cancelar" class="flex-1 py-3 bg-gray-600 text-white uppercase tracking-wider text-sm font-light hover:bg-gray-700">
          Cancelar
        </button>
        <button type="button" id="modal-pago-aceptar" class="flex-1 py-3 bg-green-600 text-white uppercase tracking-wider text-sm font-light hover:bg-green-700">
          Aceptar
        </button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0';
      var nrdDataAccessSrc = isLocalhost ? '/nrd-data-access/dist/nrd-data-access.js' : 'https://cdn.jsdelivr.net/gh/yosbany/nrd-data-access@main/dist/nrd-data-access.js';
      var script1 = document.createElement('script');
      script1.src = nrdDataAccessSrc;
      document.head.appendChild(script1);
    })();
  </script>
  <script>
    (function() {
      var isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0';
      var nrdCommonSrc = isLocalhost ? '/nrd-common/dist/nrd-common.js' : 'https://cdn.jsdelivr.net/gh/yosbany/nrd-common@main/dist/nrd-common.js';
      var script2 = document.createElement('script');
      script2.src = nrdCommonSrc;
      document.head.appendChild(script2);
    })();
  </script>
  <!-- NRD Common Library Initialization -->
  <script>
    (function(cfg) {
      var start = Date.now();
      var timer = setInterval(function() {
        if (window.NRDCommon && window.NRDCommon.initializeAppAuth) {
          clearInterval(timer);
          window.NRDCommon.initializeAppAuth(cfg);
        } else if (Date.now() - start > 10000) {
          clearInterval(timer);
          if (window.NRDCommon && window.NRDCommon.showLoginFallback) {
            window.NRDCommon.showLoginFallback();
          } else {
            var ls = document.getElementById('login-screen');
            var rs = document.getElementById('redirecting-screen');
            if (rs) rs.classList.add('hidden');
            if (ls) ls.classList.remove('hidden');
          }
        }
      }, 100);
    })({ appName: 'NRD PDV' });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('service-worker.js?v=1781967493163').catch(function(err) { console.log('SW failed', err); });
      });
    }
  </script>
  <script type="module" src="app.js?v=1781967493163"></script>
</body>
</html>
